<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunset Beauty Studio</title>

<style>
body { margin:0; font-family:Arial; }

/* HEADER */
header {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('IMG_8C20DFCE-A679-4C47-A740-9B1D04C0956E.jpeg') center/cover;
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

.btn {
  display:inline-block;
  margin:10px;
  background:#ff4d6d;
  color:white;
  padding:15px 25px;
  border-radius:30px;
  text-decoration:none;
}

.section { padding:40px; text-align:center; }

input {
  width:80%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  padding:15px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:20px;
  font-size:16px;
}

/* GALERIA */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
}

.gallery img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Sunset Beauty Studio ✨</h1>
    <p>Reserva tu cita fácil 💖</p>

    <a class="btn" href="#reserva">📅 Reservar cita</a>
  </div>
</header>

<div class="section">
  <h2>Galería</h2>
  <div class="gallery">
    <img src="dfbdf1d9-5872-4edf-bcc0-d182627ddce9.jpeg">
    <img src="b7c3c8c1-217d-4318-a2be-050aaf1fde66.jpeg">
    <img src="9e84fb3d-e883-4583-9252-9ded834060d.jpeg">
  </div>
</div>

<div class="section" id="reserva">
  <h2>Reserva tu cita</h2>

  <input type="text" id="nombre" placeholder="Tu nombre"><br>
  <input type="date" id="fecha"><br>
  <input type="time" id="hora"><br>

  <button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
</div>

<script>
function enviarWhatsApp() {
  var nombre = document.getElementById("nombre").value;
  var fecha = document.getElementById("fecha").value;
  var hora = document.getElementById("hora").value;

  var mensaje = "Hola, quiero reservar cita:\n"
              + "Nombre: " + nombre + "\n"
              + "Fecha: " + fecha + "\n"
              + "Hora: " + hora;

  var url = "https://wa.me/17252544586?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}
</script>

</body>
</html>
